name: Build Windows Installer

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Windows installer
        working-directory: apps/desktop
        run: npm run dist:win

      - name: Find and rename installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem `
            -Path "apps/desktop/release-new" `
            -Recurse `
            -File |
            Where-Object {
              (
                $_.Name -like "*Setup*.exe" -or
                $_.Extension -eq ".msi"
              ) -and
              $_.FullName -notmatch "win-unpacked"
            } |
            Select-Object -First 1

          if (-not $installer) {
            Write-Host "Files produced by the build:"
            Get-ChildItem "apps/desktop/release-new" -Recurse
            throw "No Windows installer was found."
          }

          Write-Host "Found installer: $($installer.FullName)"

          Copy-Item `
            $installer.FullName `
            "$env:GITHUB_WORKSPACE\AlphaConcept-Setup.exe"

      # Useful for testing individual workflow runs
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphaConcept-Windows-Installer
          path: AlphaConcept-Setup.exe
          retention-days: 30
          if-no-files-found: error

      # Only runs when you push a version tag such as v1.0.0
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "$env:GITHUB_WORKSPACE\AlphaConcept-Setup.exe"

          gh release create $tag `
            "$asset#Download AlphaConcept for Windows" `
            --title "AlphaConcept $tag" `
            --generate-notes `
            --verify-tag