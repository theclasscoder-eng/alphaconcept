name: Build Windows Installer

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The desktop main bundle inlines the workspace packages, so their
      # compiled dist must exist before electron-vite / electron-builder run.
      - name: Build shared packages
        run: pnpm --filter @rdp/protocol --filter @rdp/shared --filter @rdp/config build

      - name: Build Windows installer
        run: pnpm dist:win

      - name: Locate installer
        id: find
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "apps/desktop/release-new" -Recurse -File |
            Where-Object {
              ($_.Name -like "*Setup*.exe" -or $_.Extension -eq ".msi") -and
              $_.FullName -notmatch "win-unpacked"
            } |
            Select-Object -First 1

          if (-not $installer) {
            Write-Host "Files produced by the build:"
            Get-ChildItem "apps/desktop/release-new" -Recurse
            throw "No Windows installer was found."
          }

          Write-Host "Found installer: $($installer.FullName)"
          "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($installer.Name)" >> $env:GITHUB_OUTPUT

      # Downloadable from the workflow run page even without a tag.
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphaConcept-Windows-Installer
          path: ${{ steps.find.outputs.path }}
          retention-days: 30
          if-no-files-found: error

      # Only runs when you push a version tag such as v0.1.9
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "${{ steps.find.outputs.path }}#Download AlphaConcept for Windows (installer)" `
            --title "AlphaConcept ${{ github.ref_name }}" `
            --generate-notes
