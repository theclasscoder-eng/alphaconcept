# Standalone coturn configuration (alternative to the docker-compose command
# flags). Use with: turnserver -c turnserver.conf
#
# Time-limited credentials: the signaling backend derives username/credential
# from `static-auth-secret` using coturn's REST/use-auth-secret scheme. Set the
# SAME secret here and in the signaling service's TURN_SHARED_SECRET.

listening-port=3478
# tls-listening-port=5349            # enable with certificates for production

# Relay port range (open these UDP ports in your firewall).
min-port=49160
max-port=49200

# Time-limited credential mechanism.
use-auth-secret
static-auth-secret=REPLACE_WITH_TURN_SHARED_SECRET

realm=remotedesktop.local

# Production: advertise the server's PUBLIC IP so relayed candidates are routable.
# external-ip=203.0.113.10

# Recommended hardening.
no-multicast-peers
no-cli
fingerprint
stale-nonce=600

# TLS (production):
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# Development only (no encryption on the TURN control channel):
no-tls
no-dtls

log-file=stdout
verbose
